<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Check-in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --bg:#0B0E14;
    --surface:#141A28;
    --surface-2:#1B2333;
    --border:#262E42;
    --text:#EDEFF5;
    --text-dim:#8793AC;
    --accent:#E8B94B;
    --accent-dim:#4A3E1E;
    --good:#35C46B;
    --good-dim:#123321;
    --bad:#E5484D;
    --bad-dim:#3A1418;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:1000px;margin:0 auto;padding:20px 16px 60px;}
  .top{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:20px;flex-wrap:wrap;gap:12px;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{
    width:34px;height:34px;border-radius:8px;
    background:linear-gradient(135deg,var(--accent),#B8862F);
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;font-weight:700;color:#0B0E14;font-size:16px;
  }
  h1{font-family:'Space Grotesk',sans-serif;font-size:19px;margin:0;font-weight:600;letter-spacing:-0.01em;}
  .sub{color:var(--text-dim);font-size:12.5px;margin-top:1px;}
  .tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;}
  .tab-btn{
    padding:8px 16px;border-radius:7px;border:none;background:transparent;color:var(--text-dim);
    font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;cursor:pointer;transition:.15s;
  }
  .tab-btn.active{background:var(--accent);color:#0B0E14;}
  .panel{display:none;} .panel.active{display:block;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;}
  .card h2{font-family:'Space Grotesk',sans-serif;font-size:14.5px;margin:0 0 12px;color:var(--text);font-weight:600;}
  label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:5px;font-weight:500;}
  input[type=text],input[type=password]{
    width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
    padding:10px 12px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;
  }
  input:focus{outline:none;border-color:var(--accent);}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  @media(max-width:560px){.row{grid-template-columns:1fr;}}
  .btn{
    background:var(--accent);color:#0B0E14;border:none;border-radius:8px;padding:10px 16px;
    font-weight:600;font-size:13.5px;cursor:pointer;font-family:'Inter',sans-serif;transition:.15s;
  }
  .btn:hover{filter:brightness(1.08);}
  .btn.secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
  .btn:disabled{opacity:.4;cursor:default;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;}
  .stat .num{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:var(--accent);}
  .stat .lbl{font-size:11.5px;color:var(--text-dim);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;}

  .guest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}
  .guest-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;}
  .guest-card .qr{background:#fff;border-radius:8px;padding:8px;display:inline-block;margin-bottom:10px;}
  .guest-card .name{font-weight:600;font-size:13.5px;margin-bottom:2px;}
  .guest-card .meta{font-size:11.5px;color:var(--text-dim);margin-bottom:2px;}
  .badge{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:4px;letter-spacing:.02em;}
  .badge.group{background:var(--accent-dim);color:var(--accent);}
  .badge.checked{background:var(--good-dim);color:var(--good);}
  .badge.pending{background:var(--surface-2);color:var(--text-dim);}
  .guest-card .dl{margin-top:10px;width:100%;}

  .empty{color:var(--text-dim);font-size:13px;padding:30px 10px;text-align:center;}

  /* Scanner */
  .scan-wrap{position:relative;border-radius:16px;overflow:hidden;background:#000;aspect-ratio:3/4;max-width:420px;margin:0 auto;border:1px solid var(--border);}
  video{width:100%;height:100%;object-fit:cover;}
  .scan-frame{
    position:absolute;inset:15% 12%;border:3px solid var(--accent);border-radius:16px;
    box-shadow:0 0 0 2000px rgba(0,0,0,.45);pointer-events:none;
  }
  .scan-hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;color:#fff;font-size:12.5px;opacity:.85;}

  .result-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:50;
    padding:20px;
  }
  .result-overlay.show{display:flex;}
  .seal{
    width:100%;max-width:340px;background:var(--surface);border-radius:20px;padding:28px 22px;text-align:center;
    border:2px solid var(--border);animation:stamp .28s cubic-bezier(.2,1.4,.4,1);
  }
  @keyframes stamp{from{transform:scale(1.3) rotate(-6deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
  .seal-ring{
    width:88px;height:88px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;
    font-size:40px;border:4px solid;
  }
  .seal.good .seal-ring{border-color:var(--good);color:var(--good);background:var(--good-dim);}
  .seal.bad .seal-ring{border-color:var(--bad);color:var(--bad);background:var(--bad-dim);}
  .seal-status{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;letter-spacing:.02em;}
  .seal.good .seal-status{color:var(--good);}
  .seal.bad .seal-status{color:var(--bad);}
  .seal-name{font-size:16px;font-weight:600;margin-top:8px;}
  .seal-detail{font-size:12.5px;color:var(--text-dim);margin-top:4px;}
  .seal .btn{margin-top:20px;width:100%;}

  .settings-toggle{font-size:12px;color:var(--text-dim);cursor:pointer;text-decoration:underline;margin-bottom:10px;display:inline-block;}
  .hidden{display:none;}
  .save-note{font-size:11.5px;color:var(--good);margin-top:6px;display:none;}
  .save-note.show{display:block;}
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="brand">
      <div class="brand-mark">✓</div>
      <div>
        <h1>Event Check-in</h1>
        <div class="sub">QR check-in · inventory · entry security</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="admin">Admin</button>
      <button class="tab-btn" data-tab="scanner">Scanner</button>
    </div>
  </div>

  <!-- SETTINGS (shared) -->
  <div class="card">
    <span class="settings-toggle" id="settingsToggle">⚙ Backend connection settings</span>
    <div id="settingsBody" class="hidden">
      <div class="row">
        <div>
          <label>Google Apps Script Web App URL</label>
          <input type="text" id="webAppUrl" placeholder="https://script.google.com/macros/s/.../exec">
        </div>
        <div>
          <label>Admin Key (from Code.gs)</label>
          <input type="password" id="adminKey" placeholder="change-this-key-123">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn" id="saveSettings">Save connection</button>
        <span class="save-note" id="saveNote">Saved ✓</span>
      </div>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="panel active" id="panel-admin">
    <div class="stats">
      <div class="stat"><div class="num" id="statCheckedIn">–</div><div class="lbl">Checked in</div></div>
      <div class="stat"><div class="num" id="statCapacity">–</div><div class="lbl">Total guests</div></div>
      <div class="stat"><div class="num" id="statCodes">–</div><div class="lbl">QR codes</div></div>
    </div>

    <div class="card">
      <h2>Guest list & QR codes</h2>
      <div class="btn-row" style="margin-bottom:14px;">
        <button class="btn" id="loadGuests">Load / refresh from Google Sheet</button>
        <button class="btn secondary" id="downloadAll">Download all QR codes (.zip)</button>
      </div>
      <div id="guestGrid" class="guest-grid"><div class="empty">Connect your Sheet above, then click "Load / refresh".</div></div>
    </div>
  </div>

  <!-- SCANNER PANEL -->
  <div class="panel" id="panel-scanner">
    <div class="card" style="text-align:center;">
      <h2 style="text-align:left;">Scan guest QR code</h2>
      <div class="scan-wrap">
        <video id="video" playsinline muted></video>
        <div class="scan-frame"></div>
        <div class="scan-hint">Point camera at the guest's QR code</div>
      </div>
      <canvas id="canvas" class="hidden"></canvas>
      <div class="btn-row" style="justify-content:center;margin-top:14px;">
        <button class="btn secondary" id="startCamera">Start camera</button>
      </div>
      <div id="scanStatus" class="sub" style="margin-top:8px;"></div>
    </div>
  </div>

</div>

<!-- RESULT OVERLAY -->
<div class="result-overlay" id="resultOverlay">
  <div class="seal" id="sealBox">
    <div class="seal-ring" id="sealIcon">✓</div>
    <div class="seal-status" id="sealStatus">ADMITTED</div>
    <div class="seal-name" id="sealName">—</div>
    <div class="seal-detail" id="sealDetail">—</div>
    <button class="btn" id="scanNext">Scan next guest</button>
  </div>
</div>

<script>
// ---------- Storage-backed settings ----------
let config = { url: '', key: '' };

function loadConfig(){
  try{
    const raw = localStorage.getItem('checkin-config');
    if(raw){ config = JSON.parse(raw); }
  }catch(e){}
  document.getElementById('webAppUrl').value = config.url || '';
  document.getElementById('adminKey').value = config.key || '';
}
function saveConfig(){
  config.url = document.getElementById('webAppUrl').value.trim();
  config.key = document.getElementById('adminKey').value.trim();
  try{
    localStorage.setItem('checkin-config', JSON.stringify(config));
    const note = document.getElementById('saveNote');
    note.classList.add('show');
    setTimeout(()=>note.classList.remove('show'), 2000);
  }catch(e){ alert('Could not save settings: '+e); }
}
document.getElementById('saveSettings').addEventListener('click', saveConfig);
document.getElementById('settingsToggle').addEventListener('click', ()=>{
  document.getElementById('settingsBody').classList.toggle('hidden');
});

// ---------- Tabs ----------
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
    if(btn.dataset.tab === 'scanner') startCamera();
  });
});

// ---------- Admin: load guests ----------
let guestsCache = [];

async function apiCall(action, extraParams){
  if(!config.url){ throw new Error('Set the Web App URL in settings first.'); }
  const params = new URLSearchParams({ action, key: config.key, ...extraParams });
  const res = await fetch(config.url + '?' + params.toString());
  return res.json();
}

document.getElementById('loadGuests').addEventListener('click', async ()=>{
  const grid = document.getElementById('guestGrid');
  grid.innerHTML = '<div class="empty">Loading…</div>';
  try{
    const data = await apiCall('list', {});
    if(data.error){ grid.innerHTML = '<div class="empty">'+data.error+' — check your Admin Key.</div>'; return; }
    guestsCache = data.guests || [];
    renderGuests();
    refreshStats();
  }catch(e){
    grid.innerHTML = '<div class="empty">Could not load: '+e.message+'</div>';
  }
});

function renderGuests(){
  const grid = document.getElementById('guestGrid');
  if(!guestsCache.length){ grid.innerHTML = '<div class="empty">No guests found yet. Add names to your Sheet, run "Generate codes for new guests" from the Sheet menu, then refresh.</div>'; return; }
  grid.innerHTML = '';
  guestsCache.forEach(g=>{
    const card = document.createElement('div');
    card.className = 'guest-card';
    const qrHolder = document.createElement('div');
    qrHolder.className = 'qr';
    card.appendChild(qrHolder);

    const nameEl = document.createElement('div');
    nameEl.className = 'name';
    nameEl.textContent = g.name;
    card.appendChild(nameEl);

    const codeEl = document.createElement('div');
    codeEl.className = 'meta';
    codeEl.textContent = g.code;
    card.appendChild(codeEl);

    const badges = document.createElement('div');
    if(g.capacity > 1){
      const b = document.createElement('span');
      b.className = 'badge group';
      b.textContent = 'Group ×' + g.capacity;
      badges.appendChild(b);
    }
    const statusB = document.createElement('span');
    statusB.className = 'badge ' + (g.checkedIn >= g.capacity ? 'checked' : 'pending');
    statusB.style.marginLeft = '4px';
    statusB.textContent = g.checkedIn + '/' + g.capacity + ' in';
    badges.appendChild(statusB);
    card.appendChild(badges);

    const dl = document.createElement('button');
    dl.className = 'btn secondary dl';
    dl.textContent = 'Download PNG';
    card.appendChild(dl);

    grid.appendChild(card);

    new QRCode(qrHolder, { text: g.code, width: 150, height: 150, colorDark:'#0B0E14', colorLight:'#ffffff' });

    dl.addEventListener('click', ()=>{
      setTimeout(()=>{
        const img = qrHolder.querySelector('img') || qrHolder.querySelector('canvas');
        const url = img.tagName === 'CANVAS' ? img.toDataURL('image/png') : img.src;
        const a = document.createElement('a');
        a.href = url;
        a.download = g.name.replace(/[^a-z0-9]+/gi,'_') + '_' + g.code + '.png';
        a.click();
      }, 50);
    });
  });
}

async function refreshStats(){
  try{
    const data = await apiCall('status', {});
    if(!data.error){
      document.getElementById('statCheckedIn').textContent = data.totalCheckedIn;
      document.getElementById('statCapacity').textContent = data.totalCapacity;
      document.getElementById('statCodes').textContent = data.guestCount;
    }
  }catch(e){}
}

document.getElementById('downloadAll').addEventListener('click', async ()=>{
  if(!guestsCache.length){ alert('Load the guest list first.'); return; }
  const zip = new JSZip();
  for(const g of guestsCache){
    const tmp = document.createElement('div');
    tmp.style.display='none';
    document.body.appendChild(tmp);
    new QRCode(tmp, { text: g.code, width: 300, height: 300, colorDark:'#0B0E14', colorLight:'#ffffff' });
    await new Promise(r=>setTimeout(r,60));
    const img = tmp.querySelector('img') || tmp.querySelector('canvas');
    const dataUrl = img.tagName === 'CANVAS' ? img.toDataURL('image/png') : img.src;
    const base64 = dataUrl.split(',')[1];
    zip.file(g.name.replace(/[^a-z0-9]+/gi,'_') + '_' + g.code + '.png', base64, {base64:true});
    document.body.removeChild(tmp);
  }
  const blob = await zip.generateAsync({type:'blob'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'guest_qr_codes.zip';
  a.click();
});

// ---------- Scanner ----------
let stream = null;
let scanning = false;

async function startCamera(){
  const video = document.getElementById('video');
  const statusEl = document.getElementById('scanStatus');
  if(stream) return;
  try{
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = stream;
    await video.play();
    scanning = true;
    statusEl.textContent = 'Camera active — ready to scan';
    requestAnimationFrame(scanLoop);
  }catch(e){
    statusEl.textContent = 'Camera error: ' + e.message + ' (use https and allow camera access)';
  }
}
document.getElementById('startCamera').addEventListener('click', startCamera);

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let lastScannedCode = null;
let lastScanTime = 0;

function scanLoop(){
  const video = document.getElementById('video');
  if(scanning && video.readyState === video.HAVE_ENOUGH_DATA){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    if(code && code.data){
      const now = Date.now();
      if(code.data !== lastScannedCode || now - lastScanTime > 3000){
        lastScannedCode = code.data;
        lastScanTime = now;
        handleScan(code.data);
      }
    }
  }
  requestAnimationFrame(scanLoop);
}

async function handleScan(codeText){
  document.getElementById('scanStatus').textContent = 'Checking "' + codeText + '"…';
  try{
    const params = new URLSearchParams({ action:'verify', code: codeText });
    const res = await fetch(config.url + '?' + params.toString());
    const data = await res.json();
    showResult(data);
  }catch(e){
    showResult({ valid:false, reason:'error', error: e.message });
  }
}

function showResult(data){
  const overlay = document.getElementById('resultOverlay');
  const seal = document.getElementById('sealBox');
  const icon = document.getElementById('sealIcon');
  const status = document.getElementById('sealStatus');
  const name = document.getElementById('sealName');
  const detail = document.getElementById('sealDetail');

  if(data.valid){
    seal.className = 'seal good';
    icon.textContent = '✓';
    status.textContent = 'ADMITTED';
    name.textContent = data.name;
    detail.textContent = data.capacity > 1
      ? (data.checkedIn + ' of ' + data.capacity + ' from this group admitted')
      : 'Checked in successfully';
  } else {
    seal.className = 'seal bad';
    icon.textContent = '✕';
    if(data.reason === 'full'){
      status.textContent = 'DENIED — FULL';
      name.textContent = data.name || 'Group limit reached';
      detail.textContent = 'All ' + data.capacity + ' guests already admitted';
    } else if(data.reason === 'notfound'){
      status.textContent = 'INVALID CODE';
      name.textContent = 'Not on guest list';
      detail.textContent = 'This QR code was not recognized';
    } else {
      status.textContent = 'ERROR';
      name.textContent = 'Connection problem';
      detail.textContent = data.error || 'Check backend settings';
    }
  }
  overlay.classList.add('show');
}
document.getElementById('scanNext').addEventListener('click', ()=>{
  document.getElementById('resultOverlay').classList.remove('show');
});

// ---------- Init ----------
loadConfig();
</script>
</body>
</html>
